<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap');
:root{--bg:#080E18;--navy:#0C1520;--navy2:#111D2E;--navy3:#162438;--slate:#1E2E42;--border:#1E2D42;--gold:#C8A96E;--gold2:#DFC08A;--gold-dim:#6A5030;--cyan:#7EB8D4;--text:#E8EAF0;--muted:#8A9CB8;--green:#6BCB8B;--amber:#D4A020;--orange:#D47840;--purple:#A87EC8;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-weight:300;overflow-x:hidden;}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(30,45,66,0.28) 1px,transparent 1px),linear-gradient(90deg,rgba(30,45,66,0.28) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.orb1{position:fixed;top:-15vh;left:-10vw;width:55vw;height:55vw;background:radial-gradient(circle,rgba(126,184,212,0.05) 0%,transparent 65%);pointer-events:none;z-index:0;}
.orb2{position:fixed;bottom:-20vh;right:-10vw;width:60vw;height:60vw;background:radial-gradient(circle,rgba(200,169,110,0.04) 0%,transparent 65%);pointer-events:none;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:62px;background:rgba(8,14,24,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,169,110,0.1);}
.nav-logo{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:10px;}
.nav-logo img{height:36px;width:36px;border-radius:6px;flex-shrink:0;}
.nav-links{display:flex;gap:28px;list-style:none;}
.nav-links a{font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover{color:var(--gold);}
.nav-cta{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--navy);background:var(--gold);padding:8px 18px;border-radius:2px;text-decoration:none;transition:background 0.2s;}
.nav-cta:hover{background:var(--gold2);}
#hero{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;padding:110px 48px 80px;}
.hero-layout{max-width:1280px;margin:0 auto;width:100%;display:grid;grid-template-columns:1fr 300px;gap:56px;align-items:start;}
.hero-eyebrow{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
.eyebrow-line{width:40px;height:1px;background:var(--gold);}
.eyebrow-text{font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.hero-name{font-family:'Cormorant Garamond',serif;font-size:clamp(45px,5.5vw,71px);font-weight:600;line-height:1.05;color:var(--text);margin-bottom:6px;}
.hero-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(17px,2.2vw,23px);font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:22px;}
.hero-rule{width:80px;height:2px;background:linear-gradient(90deg,var(--cyan),transparent);margin-bottom:22px;}
.hero-bio{font-size:16px;font-weight:300;line-height:1.8;color:#BBCCD8;max-width:600px;margin-bottom:28px;}
.hero-bio strong{color:var(--text);font-weight:500;}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;}
.btn-primary{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--navy);background:var(--gold);padding:13px 24px;border-radius:2px;text-decoration:none;transition:all 0.2s;}
.btn-primary:hover{background:var(--gold2);transform:translateY(-1px);}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);background:transparent;border:1px solid rgba(200,169,110,0.35);padding:13px 24px;border-radius:2px;text-decoration:none;transition:all 0.2s;}
.btn-secondary:hover{border-color:var(--gold);background:rgba(200,169,110,0.06);}
.bio-sidebar{background:rgba(17,29,46,0.85);border:1px solid var(--border);border-radius:4px;overflow:hidden;backdrop-filter:blur(8px);position:sticky;top:82px;}
.bio-sidebar::before{content:'';display:block;height:2px;background:linear-gradient(90deg,var(--gold),var(--cyan),transparent);}
.headshot-wrap{width:100%;aspect-ratio:1;overflow:hidden;background:var(--navy3);}
.headshot-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.bio-body{padding:22px;}
.bio-name{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:var(--text);margin-bottom:3px;}
.bio-role{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.bio-creds{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
.bio-cred{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text);}
.bc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.bio-divider{height:1px;background:var(--border);margin:14px 0;}
.bio-text{font-size:13px;font-weight:300;color:var(--muted);line-height:1.6;margin-bottom:16px;}
.bio-li-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--navy);background:var(--gold);border-radius:2px;text-decoration:none;transition:background 0.2s;}
.bio-li-btn:hover{background:var(--gold2);}
section{position:relative;z-index:1;}
.section-inner{max-width:1280px;margin:0 auto;padding:88px 48px;}
.section-header{margin-bottom:48px;}
.section-eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.section-eyebrow span{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.s-line{width:28px;height:1px;background:var(--gold);}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(27px,3.2vw,47px);font-weight:600;color:var(--text);line-height:1.1;}
.section-title em{font-style:normal;color:var(--gold);}
#themes{background:rgba(11,18,28,0.7);}
.themes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.theme-card{background:var(--navy);padding:30px 24px;position:relative;overflow:hidden;transition:background 0.25s;cursor:default;}
.theme-card:hover{background:var(--navy3);}
.theme-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;transform:scaleX(0);transform-origin:left;transition:transform 0.3s ease;}
.theme-card:hover::after{transform:scaleX(1);}
.tc1::after{background:var(--cyan);}.tc2::after{background:var(--gold);}.tc3::after{background:var(--green);}
.tc4::after{background:var(--amber);}.tc5::after{background:var(--orange);}.tc6::after{background:var(--purple);}
.theme-num{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:700;color:var(--border);line-height:1;margin-bottom:14px;transition:color 0.3s;}
.theme-card:hover .theme-num{color:var(--slate);}
.theme-icon{font-size:19px;margin-bottom:12px;display:block;}
.theme-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text);margin-bottom:9px;line-height:1.3;}
.theme-desc{font-size:13px;font-weight:300;color:var(--muted);line-height:1.6;}
#prif{background:var(--bg);}
.prif-visual{display:flex;align-items:center;justify-content:center;}
.aihr-wrap{width:100%;background:linear-gradient(135deg,#030a16 0%,#0a1828 50%,#061220 100%);border:1px solid var(--border);border-radius:8px;padding:32px 28px;position:relative;overflow:hidden;}
.aihr-wrap::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(20,40,70,0.4) 1px,transparent 1px),linear-gradient(90deg,rgba(20,40,70,0.4) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
.aihr-wrap::after{content:'';position:absolute;top:-40%;left:-20%;width:80%;height:80%;background:radial-gradient(circle,rgba(30,80,160,0.25) 0%,transparent 65%);pointer-events:none;}
.aihr-title-row{text-align:center;margin-bottom:24px;position:relative;z-index:1;}
.aihr-main{display:block;font-family:'Barlow Condensed',sans-serif;font-size:clamp(29px,4vw,43px);font-weight:700;color:white;letter-spacing:1px;text-shadow:0 0 30px rgba(126,184,212,0.5);}
.aihr-sub{display:block;font-size:14px;font-weight:500;color:var(--cyan);letter-spacing:1.5px;margin-top:4px;}
.aihr-stack{display:flex;flex-direction:column;gap:6px;position:relative;z-index:1;margin-bottom:20px;}
.aihr-layer{position:relative;padding:14px 20px;border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:default;transition:filter 0.2s;}
.aihr-layer:hover{filter:brightness(1.15);}
.al-glow{position:absolute;inset:0;opacity:0.15;}
.al-label{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:white;position:relative;z-index:1;text-shadow:0 1px 8px rgba(0,0,0,0.6);}
.al1{background:linear-gradient(90deg,#0d4a9a,#1a80d4);box-shadow:0 0 20px rgba(26,128,212,0.35),inset 0 1px 0 rgba(255,255,255,0.15);}
.al1 .al-glow{background:radial-gradient(ellipse at center,rgba(100,181,246,0.4) 0%,transparent 70%);}
.al2{background:linear-gradient(90deg,#0d6b1e,#1ea83c);box-shadow:0 0 20px rgba(30,168,60,0.35),inset 0 1px 0 rgba(255,255,255,0.15);}
.al2 .al-glow{background:radial-gradient(ellipse at center,rgba(102,187,106,0.4) 0%,transparent 70%);}
.al3{background:linear-gradient(90deg,#8a6800,#d4a800);box-shadow:0 0 20px rgba(212,168,0,0.35),inset 0 1px 0 rgba(255,255,255,0.15);}
.al3 .al-glow{background:radial-gradient(ellipse at center,rgba(255,213,79,0.35) 0%,transparent 70%);}
.al4{background:linear-gradient(90deg,#8a2a00,#d44800);box-shadow:0 0 20px rgba(212,72,0,0.4),inset 0 1px 0 rgba(255,255,255,0.15);}
.al4 .al-glow{background:radial-gradient(ellipse at center,rgba(255,112,67,0.4) 0%,transparent 70%);}
.al5{background:linear-gradient(90deg,#1e3040,#2e4a60);box-shadow:0 0 12px rgba(46,74,96,0.4),inset 0 1px 0 rgba(255,255,255,0.1);}
.al5 .al-glow{background:radial-gradient(ellipse at center,rgba(96,125,139,0.3) 0%,transparent 70%);}
.aihr-footer{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1;}
.aihr-tag{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:2px;background:rgba(200,169,110,0.1);color:var(--gold);border:1px solid rgba(200,169,110,0.25);}
.prif-layout{display:grid;grid-template-columns:1fr 1fr;gap:68px;align-items:start;}
.prif-intro{font-size:16px;font-weight:300;color:#BBCCD8;line-height:1.8;margin-bottom:22px;}
.prif-intro strong{color:var(--text);font-weight:500;}
.prif-quote{background:rgba(22,36,56,0.5);border-left:2px solid var(--gold);padding:18px 22px;margin-top:24px;border-radius:0 4px 4px 0;}
.prif-quote p{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--gold2);line-height:1.6;}
#credentials{background:rgba(11,18,28,0.7);}
.creds-layout{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start;}
.creds-grid{display:grid;grid-template-columns:1fr;gap:12px;}
.cred-card{background:var(--navy);border:1px solid var(--border);border-radius:4px;padding:20px;position:relative;overflow:hidden;transition:border-color 0.2s,background 0.2s;}
.cred-card:hover{border-color:rgba(200,169,110,0.22);background:var(--navy2);}
.cred-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.cc-gold::before{background:var(--gold);}.cc-cyan::before{background:var(--cyan);}.cc-green::before{background:var(--green);}
.cred-icon{font-size:19px;margin-bottom:8px;}
.cred-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text);margin-bottom:6px;}
.cred-body{font-size:13px;font-weight:300;color:var(--muted);line-height:1.6;}
.timeline{position:relative;padding-left:24px;}
.timeline::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:1px;background:linear-gradient(to bottom,var(--gold),var(--cyan),transparent);}
.tl-item{position:relative;margin-bottom:22px;}
.tl-dot{position:absolute;left:-29px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--bg);border:2px solid var(--gold);}
.tl-date{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
.tl-role{font-size:15px;font-weight:500;color:var(--text);margin-bottom:2px;}
.tl-org{font-size:13px;color:var(--muted);}
#contact{background:var(--navy);border-top:1px solid var(--border);}
.contact-layout{max-width:1280px;margin:0 auto;padding:88px 48px;display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center;}
.contact-title{font-family:'Cormorant Garamond',serif;font-size:clamp(27px,3.2vw,45px);font-weight:600;color:var(--text);line-height:1.1;margin-bottom:12px;}
.contact-title em{font-style:normal;color:var(--gold);}
.contact-sub{font-size:15px;font-weight:300;color:var(--muted);line-height:1.7;margin-bottom:28px;}
.contact-links{display:flex;flex-direction:column;gap:10px;}
.contact-link{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--text);text-decoration:none;padding:14px 16px;background:rgba(22,36,56,0.5);border:1px solid var(--border);border-radius:4px;transition:all 0.2s;}
.contact-link:hover{border-color:rgba(200,169,110,0.3);background:var(--navy3);color:var(--gold);}
.cl-icon{font-size:16px;flex-shrink:0;}
.cl-label{font-weight:300;color:var(--muted);font-size:11px;display:block;margin-top:1px;}
.mandate-box{background:rgba(22,36,56,0.4);border:1px solid var(--border);border-radius:4px;padding:28px;position:relative;overflow:hidden;}
.mandate-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--cyan),transparent);}
.mandate-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
.mandate-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;color:#BBCCD8;}
.mandate-item:last-child{border-bottom:none;}
.mi-arr{color:var(--gold);flex-shrink:0;margin-top:2px;font-size:11px;}
footer{position:relative;z-index:1;background:var(--bg);border-top:1px solid var(--border);padding:22px 48px;display:flex;align-items:center;justify-content:space-between;}
.footer-left{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.footer-strip{display:flex;}
.fs-seg{width:28px;height:3px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.fu{opacity:0;animation:fadeUp 0.65s ease forwards;}
.d1{animation-delay:.1s;}.d2{animation-delay:.25s;}.d3{animation-delay:.4s;}.d4{animation-delay:.55s;}.d5{animation-delay:.7s;}
@media(max-width:1080px){.hero-layout{grid-template-columns:1fr;}.bio-sidebar{display:none;}.themes-grid{grid-template-columns:repeat(2,1fr);}.prif-layout,.creds-layout,.contact-layout{grid-template-columns:1fr;gap:44px;}}
@media(max-width:640px){nav{padding:0 20px;}.nav-links{display:none;}#hero,.section-inner,.contact-layout{padding-left:20px;padding-right:20px;}.themes-grid{grid-template-columns:1fr;}footer{padding:18px 20px;flex-direction:column;gap:12px;}}
</style>
