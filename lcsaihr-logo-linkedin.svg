<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">

  <!-- Background -->
  <rect width="400" height="400" rx="18" fill="#0a0c0f"/>

  <!-- Subtle inner border -->
  <rect x="1" y="1" width="398" height="398" rx="17" fill="none" stroke="#c8f000" stroke-width="0.75" opacity="0.12"/>

  <!-- Brand mark: 3 decreasing bars top-right -->
  <rect x="308" y="55" width="40" height="3" rx="1.5" fill="#c8f000" opacity="1"/>
  <rect x="316" y="64" width="28" height="2.5" rx="1.25" fill="#c8f000" opacity="0.65"/>
  <rect x="324" y="72" width="18" height="2" rx="1" fill="#c8f000" opacity="0.35"/>

  <!-- LCS primary mark -->
  <text x="200" y="178"
        dominant-baseline="central"
        text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
        font-weight="700"
        font-size="108"
        fill="#ffffff"
        letter-spacing="-3">LCS</text>

  <!-- Green separator line -->
  <rect x="52" y="218" width="296" height="1.5" fill="#c8f000"/>

  <!-- aihr secondary mark -->
  <text x="200" y="262"
        dominant-baseline="central"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="300"
        font-size="37"
        fill="#c8f000"
        letter-spacing="8">aihr</text>

  <!-- Subtle bottom url -->
  <text x="200" y="340"
        dominant-baseline="central"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="12"
        fill="#c8f000"
        opacity="0.35"
        letter-spacing="2.5">lcsaihr.com</text>

</svg>
